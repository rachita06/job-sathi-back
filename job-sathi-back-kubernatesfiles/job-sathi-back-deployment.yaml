apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-sathi-back
spec:
  replicas: 1
  selector:
    matchLabels:
      app: job-sathi-back
  template:
    metadata:
      labels:
        app: job-sathi-back
    spec:
      containers:
      - name: job-sathi-back
        image: rachita06/job-sathi-back:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: job-sathi-back-service
spec:
  selector:
    app: job-sathi-back
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
  type: NodePort
